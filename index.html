<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lottern 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #2563EB;
    --accent-dark: #1D4ED8;
    --bg: #F4F5F7;
    --surface: #FFFFFF;
    --text: #1A1A2E;
    --muted: #9CA3AF;
    --border: #E2E4E9;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  /* ── CONTROLLER VIEW (iPhone) ── */
  #controller {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    width: 100%; height: 100%;
    padding: 52px 20px 36px;
    background: var(--bg);
    position: relative;
  }

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 1;
  }

  .coats-of-arms {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .coats-of-arms img {
    width: 72px;
    height: auto;
  }

  .title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .subtitle {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Canvas wrapper */
  #canvas-wrap {
    position: relative;
    width: 100%;
    flex: 1;
    max-height: 60vh;
    margin: 20px 0 16px;
    z-index: 1;
    background: var(--surface);
    border-radius: 16px;
    border: 1.5px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  #draw-canvas {
    width: 100%;
    height: 100%;
    display: block;
    cursor: crosshair;
    touch-action: none;
  }

  /* Buttons */
  .actions {
    display: flex;
    gap: 12px;
    width: 100%;
    z-index: 1;
  }

  .btn {
    flex: 1;
    height: 54px;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .btn-clear {
    background: var(--surface);
    color: var(--muted);
    border: 1.5px solid var(--border);
  }
  .btn-clear:active {
    background: #F0F0F0;
    color: var(--text);
  }

  /* Hint */
  #hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: #C8CBD2;
    pointer-events: none;
    transition: opacity 0.3s;
    text-align: center;
    line-height: 2;
    white-space: nowrap;
  }

  #btn-fullscreen {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    padding: 4px 8px;
    cursor: pointer;
    z-index: 2;
  }
  #btn-fullscreen:active {
    background: #F0F0F0;
    color: var(--text);
  }

</style>
</head>
<body>

<!-- CONTROLLER (shown on iPhone) -->
<div id="controller">
  <div class="header">
    <div class="coats-of-arms">
      <img src="hove.svg" alt="Wappen Hove">
      <div class="title">Lottern 2026</div>
      <img src="moorende.svg" alt="Wappen Moorende">
    </div>
    <div class="subtitle">Freiwillige Feuerwehr</div>
  </div>

  <div id="canvas-wrap">
    <canvas id="draw-canvas"></canvas>
    <div id="hint">Zahl einschreiben<br><span style="font-size:12px;color:#D1D5DB;letter-spacing:0.05em">1 – 99</span></div>
  </div>

  <div class="actions">
    <button class="btn btn-clear" id="btn-clear">Löschen</button>
  </div>

  <button id="btn-fullscreen">Vollbild</button>

</div>


<script>
// ── Canvas setup ──────────────────────────────────────────────
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');

let drawing = false;
let hasStrokes = false;
let paths = []; // store all strokes for replay
let currentPath = [];

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
  ctx.scale(dpr, dpr);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  redraw();
}

function redraw() {
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  ctx.strokeStyle = '#1A1A2E';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (const path of paths) {
    if (path.length < 2) continue;
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) {
      const prev = path[i - 1];
      const curr = path[i];
      const mx = (prev.x + curr.x) / 2;
      const my = (prev.y + curr.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.lineTo(path[path.length - 1].x, path[path.length - 1].y);
    ctx.stroke();
  }
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  currentPath = [getPos(e)];
  if (!hasStrokes) {
    hasStrokes = true;
    hint.style.opacity = '0';
  }
}

function moveDraw(e) {
  e.preventDefault();
  if (!drawing) return;
  const pt = getPos(e);
  currentPath.push(pt);
  // Draw incremental segment
  if (currentPath.length >= 2) {
    const prev = currentPath[currentPath.length - 2];
    const curr = currentPath[currentPath.length - 1];
    ctx.strokeStyle = '#1A1A2E';
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(prev.x, prev.y);
    ctx.lineTo(curr.x, curr.y);
    ctx.stroke();
  }
}

function endDraw(e) {
  if (!drawing) return;
  drawing = false;
  if (currentPath.length > 0) {
    paths.push([...currentPath]);
    currentPath = [];
  }
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', moveDraw, { passive: false });
canvas.addEventListener('touchend', endDraw);

// ── Clear ─────────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', () => {
  paths = [];
  currentPath = [];
  hasStrokes = false;
  hint.style.opacity = '1';
  redraw();
});

// ── Fullscreen ────────────────────────────────────────────────
const btnFullscreen = document.getElementById('btn-fullscreen');
btnFullscreen.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
});
document.addEventListener('fullscreenchange', () => {
  btnFullscreen.textContent = document.fullscreenElement ? 'Vollbild beenden' : 'Vollbild';
});

// ── Init ──────────────────────────────────────────────────────
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Prevent scroll/bounce
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
</body>
</html>
